name = "grandeprairie-dev"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

# Cloudflare Account
# account_id is read from CLOUDFLARE_ACCOUNT_ID env var or `wrangler login`

[[d1_databases]]
binding = "DB"
database_name = "grandeprairie-dev-db"
database_id = "f5ccf914-4391-48bd-aff4-c0ee80440a2c"

[[kv_namespaces]]
binding = "SESSIONS"
id = "51c329f4ed504ac6ab29caf4d2d66bf0"

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://grandeprairie.dev"
